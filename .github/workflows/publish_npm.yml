name: CI Pipeline

on:
    push:
        branches: [main]

jobs:
    build-test:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v4
            
            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                node-version: 24
                # cache: "npm"          # enables only if lock file exists
            
            - name: Install dependencies
              run: npm install

            - name: Build Package
              run: npm run build

            - name: Run Tests
              run: npm test

            - name: Publish to npm
              run: npm publish --access public
              env:
                NODE_AUTH_TOKEN: ${{secrets.NPM_TOKEN}}