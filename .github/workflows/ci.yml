name: CI Pipeline

on:
    push:
        branches: [main,dev]
    pull_request:
        branches: [main]

jobs:
    build-test:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: action/checkout@v3
            
            - name: Setup Node
              uses: action/setup-node@v3
              with:
                node-version: 18
                cache: "npm"
            
            - name: Install dependencies
              run: npm install

            - name: Build Package
              run: npm run build

            - name: Run Tests
              run: npm test
        